<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>LeadClinic</title>
<style>
/* RESET + BASE */
html,body{margin:0;padding:0;box-sizing:border-box;-webkit-text-size-adjust:100%;text-size-adjust:100%}
*,*:before,*:after{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:14px;line-height:1.5;background:#F4F3EF;color:#111;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none}
input,select{font-family:inherit;-webkit-appearance:none;appearance:none}

/* CSS VARS — fallback-safe */
:root{
  --bg:#F4F3EF;--white:#FFFFFF;--surface2:#F8F7F4;--b1:rgba(0,0,0,0.07);--b2:rgba(0,0,0,0.13);
  --t1:#111110;--t2:#6B6A65;--t3:#A09F9A;
  --r:#C1170D;--rbg:#FEF0EF;--rbd:#F5C4C0;
  --a:#9A5A08;--abg:#FDF3E3;--abd:#F5D49A;
  --g:#0A6640;--gbg:#E8F7EF;--gbd:#94D4B4;
  --bl:#1050A0;--blbg:#EAF0FB;--blbd:#9AB8EC;
  --p:#5A3FC0;--pbg:#F0EDFC;--pbd:#C0B0F0;
  --gr:#4A4A46;--grbg:#F1EFE9;--grbd:#C4C2BB;
  --co:#A83010;--cobg:#FDF0EB;--cobd:#F0B89A;
  --radius:10px;--radius-sm:7px;--radius-lg:14px;
  --shadow:0 1px 4px rgba(0,0,0,0.08);
  --sidebar:240px;
}

/* LAYOUT */
.app{display:-webkit-box;display:-ms-flexbox;display:flex;min-height:100vh;min-height:-webkit-fill-available}
.sidebar{width:var(--sidebar);-ms-flex-negative:0;flex-shrink:0;background:var(--white);border-right:1px solid var(--b1);display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;position:fixed;top:0;left:0;height:100vh;height:-webkit-fill-available;overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:200;-webkit-transition:left 0.25s ease;transition:left 0.25s ease}
.sidebar.hidden{left:calc(-1 * var(--sidebar))}
.sidebar-overlay{display:none;position:fixed;inset:0;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:199;-webkit-tap-highlight-color:transparent}
.sidebar-overlay.show{display:block}
.main{margin-left:var(--sidebar);-webkit-box-flex:1;-ms-flex:1;flex:1;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;min-height:100vh;min-width:0}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--b1);padding:12px 20px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;position:-webkit-sticky;position:sticky;top:0;z-index:100;gap:10px}
.topbar-left{-webkit-box-flex:1;-ms-flex:1;flex:1;min-width:0}
.topbar-title{font-size:15px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0}
.topbar-sub{font-size:11px;color:var(--t3);margin:1px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:-webkit-box;display:-ms-flexbox;display:flex;gap:8px;-ms-flex-negative:0;flex-shrink:0}
.menu-btn{display:none;padding:8px;background:none;border:1px solid var(--b2);border-radius:var(--radius-sm);color:var(--t2);-webkit-tap-highlight-color:transparent}

/* CONTENT */
.content{padding:18px 20px;-webkit-box-flex:1;-ms-flex:1;flex:1;overflow-x:hidden}

/* SIDEBAR INTERNALS */
.logo-area{padding:18px 16px 14px;border-bottom:1px solid var(--b1)}
.logo-row{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:9px;margin-bottom:3px}
.logo-icon{width:28px;height:28px;background:var(--t1);border-radius:7px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;-ms-flex-negative:0;flex-shrink:0}
.logo-name{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-0.3px}
.logo-tag{font-size:10px;color:var(--t3);letter-spacing:0.6px;text-transform:uppercase;padding-left:37px}
.nav-wrap{padding:10px 10px 4px}
.nav-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.7px;padding:6px 8px 4px;font-weight:600}
.nav-item{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--t2);-webkit-transition:background 0.12s,color 0.12s;transition:background 0.12s,color 0.12s;margin-bottom:2px;-webkit-tap-highlight-color:transparent;border:none;background:none;width:100%;text-align:left}
.nav-item:hover,.nav-item:focus{background:var(--bg);color:var(--t1);outline:none}
.nav-item.active{background:var(--t1);color:#fff}
.nav-item.active .nav-cnt{background:rgba(255,255,255,0.22);color:#fff}
.nav-ico{width:16px;height:16px;-ms-flex-negative:0;flex-shrink:0;opacity:0.65}
.nav-item.active .nav-ico{opacity:1}
.nav-cnt{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--t2)}
.nav-urgent .nav-cnt{background:var(--rbg);color:var(--r)}
.sidebar-footer{margin-top:auto;padding:14px;border-top:1px solid var(--b1)}
.sf-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;font-weight:600}
.sf-row{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;-webkit-box-align:center;-ms-flex-align:center;align-items:center;margin-bottom:6px}
.sf-lbl{font-size:12px;color:var(--t2)}
.sf-val{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}

/* BUTTONS */
.btn{display:inline-block;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--b2);background:var(--white);font-size:12px;font-weight:500;color:var(--t1);-webkit-transition:background 0.12s;transition:background 0.12s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn:hover,.btn:focus{background:var(--bg);outline:none}
.btn-dark{background:var(--t1);color:#fff;border-color:var(--t1)}
.btn-dark:hover{opacity:0.88;background:var(--t1)}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--white);border:1px solid var(--b1);border-radius:var(--radius);padding:14px}
.kpi-ico{width:30px;height:30px;border-radius:8px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;margin-bottom:10px}
.kpi-val{font-size:26px;font-weight:700;line-height:1;letter-spacing:-1px;margin-bottom:3px;font-variant-numeric:tabular-nums}
.kpi-lbl{font-size:11px;color:var(--t2);font-weight:500}
.kpi-sub{font-size:10px;color:var(--t3);margin-top:3px}
.kpi-r .kpi-ico{background:var(--rbg)} .kpi-r .kpi-val{color:var(--r)}
.kpi-a .kpi-ico{background:var(--abg)} .kpi-a .kpi-val{color:var(--a)}
.kpi-g .kpi-ico{background:var(--gbg)} .kpi-g .kpi-val{color:var(--g)}
.kpi-bl .kpi-ico{background:var(--blbg)} .kpi-bl .kpi-val{color:var(--bl)}

/* BANNERS */
.banner{border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:12px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:9px;line-height:1.5}
.banner-r{background:var(--rbg);border:1px solid var(--rbd);color:var(--r)}
.banner-g{background:var(--gbg);border:1px solid var(--gbd);color:var(--g)}
.banner-a{background:var(--abg);border:1px solid var(--abd);color:var(--a)}
.banner b,.banner strong{font-weight:700}

/* SECTION HEADER */
.sec-hdr{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:baseline;-ms-flex-align:baseline;align-items:baseline;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;margin-bottom:10px;gap:8px;-ms-flex-wrap:wrap;flex-wrap:wrap}
.sec-title{font-size:13px;font-weight:700;color:var(--t1)}
.sec-meta{font-size:11px;color:var(--t3)}

/* TABLE */
.tbl{background:var(--white);border:1px solid var(--b1);border-radius:var(--radius);overflow:hidden;margin-bottom:18px}
.tbl-hdr{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--b1);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--t3)}
.tbl-row{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--b1);cursor:pointer;-webkit-transition:background 0.1s;transition:background 0.1s;-webkit-tap-highlight-color:transparent}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover,.tbl-row:focus{background:var(--bg);outline:none}
.tbl-row:active{background:var(--surface2)}
.tr-info{-webkit-box-flex:1;-ms-flex:1;flex:1;min-width:0}
.tr-name{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-meta{font-size:11px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-badges{display:-webkit-box;display:-ms-flexbox;display:flex;gap:4px;-ms-flex-wrap:wrap;flex-wrap:wrap;-ms-flex-negative:0;flex-shrink:0;max-width:280px}
.tr-score{text-align:right;-ms-flex-negative:0;flex-shrink:0;min-width:48px}
.tr-score-val{font-size:20px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.tr-score-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px}

/* RANK BUBBLE */
.rb{width:26px;height:26px;border-radius:50%;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;font-size:11px;font-weight:700;-ms-flex-negative:0;flex-shrink:0;font-variant-numeric:tabular-nums}
.rb-gold{background:var(--abg);color:var(--a)}
.rb-silver{background:var(--grbg);color:var(--gr)}
.rb-bronze{background:var(--cobg);color:var(--co)}
.rb-rest{background:var(--bg);color:var(--t3)}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;line-height:1.6}
.b-r{background:var(--rbg);color:var(--r)}
.b-a{background:var(--abg);color:var(--a)}
.b-g{background:var(--gbg);color:var(--g)}
.b-bl{background:var(--blbg);color:var(--bl)}
.b-p{background:var(--pbg);color:var(--p)}
.b-gr{background:var(--grbg);color:var(--gr)}
.b-co{background:var(--cobg);color:var(--co)}

/* SCORE BAR */
.sbar-wrap{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px}
.sbar-track{-webkit-box-flex:1;-ms-flex:1;flex:1;height:5px;background:var(--b2);border-radius:3px;overflow:hidden}
.sbar-fill{height:5px;border-radius:3px}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
.card{background:var(--white);border:1px solid var(--b1);border-radius:var(--radius);padding:14px;cursor:pointer;-webkit-transition:box-shadow 0.15s,border-color 0.15s;transition:box-shadow 0.15s,border-color 0.15s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;display:block;border-left-width:3px}
.card:hover{box-shadow:var(--shadow);border-color:var(--b2)}
.card:active{background:var(--bg)}
.card-alta{border-left-color:var(--r)}
.card-media{border-left-color:var(--a)}
.card-baja{border-left-color:var(--grbd)}
.card-top{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;-webkit-box-align:flex-start;-ms-flex-align:flex-start;align-items:flex-start;margin-bottom:9px;gap:8px}
.card-name{font-size:13px;font-weight:700;color:var(--t1);line-height:1.3}
.card-city{font-size:11px;color:var(--t3);margin-top:2px}
.card-score-box{text-align:center;border-radius:8px;padding:6px 10px;-ms-flex-negative:0;flex-shrink:0}
.card-score-num{font-size:22px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.card-score-lbl{font-size:9px;opacity:0.7;text-transform:uppercase;letter-spacing:0.4px;margin-top:1px}
.card-badges{display:-webkit-box;display:-ms-flexbox;display:flex;gap:4px;-ms-flex-wrap:wrap;flex-wrap:wrap;margin-bottom:9px}
.card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;border-top:1px solid var(--b1);padding-top:9px;margin-top:2px}
.cs-val{font-size:13px;font-weight:700;color:var(--t1);text-align:center;font-variant-numeric:tabular-nums}
.cs-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:0.4px;text-align:center;margin-top:1px}
.card-foot{margin-top:9px;border-top:1px solid var(--b1);padding-top:8px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;-webkit-box-align:flex-end;-ms-flex-align:flex-end;align-items:flex-end;gap:6px}
.card-srv-lbl{font-size:10px;color:var(--t3)}
.card-srv{font-size:11px;font-weight:500;color:var(--t1);margin-top:1px;line-height:1.3}
.card-link{font-size:11px;color:var(--bl);font-weight:600;white-space:nowrap}

/* FILTER BAR */
.filter-bar{background:var(--white);border:1px solid var(--b1);border-radius:var(--radius);padding:9px 12px;margin-bottom:14px;display:-webkit-box;display:-ms-flexbox;display:flex;gap:7px;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-ms-flex-wrap:wrap;flex-wrap:wrap}
.filter-lbl{font-size:11px;color:var(--t2);font-weight:600;white-space:nowrap}
.chip{display:inline-block;padding:5px 11px;border-radius:20px;border:1px solid var(--b2);background:transparent;font-size:11px;font-weight:500;cursor:pointer;color:var(--t2);-webkit-transition:all 0.1s;transition:all 0.1s;-webkit-tap-highlight-color:transparent;font-family:inherit;-webkit-appearance:none;appearance:none}
.chip:hover,.chip:focus{border-color:var(--t1);color:var(--t1);outline:none}
.chip.on{background:var(--t1);color:#fff;border-color:var(--t1)}

/* CITY CHART */
.city-chart{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;gap:9px}
.cc-row{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:9px}
.cc-lbl{font-size:12px;font-weight:600;color:var(--t1);min-width:82px}
.cc-track{-webkit-box-flex:1;-ms-flex:1;flex:1;height:20px;background:var(--bg);border-radius:4px;overflow:hidden}
.cc-bar{height:20px;border-radius:4px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;padding-left:8px;min-width:28px}
.cc-n{font-size:11px;color:var(--t3);min-width:28px;text-align:right}

/* DETAIL */
.det-hdr{background:var(--white);border:1px solid var(--b1);border-radius:var(--radius);padding:18px;margin-bottom:12px}
.det-top{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:flex-start;-ms-flex-align:flex-start;align-items:flex-start;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;gap:10px;margin-bottom:12px}
.det-name{font-size:17px;font-weight:700;color:var(--t1);line-height:1.25;letter-spacing:-0.3px}
.det-city{font-size:13px;color:var(--t2);margin-top:3px}
.det-badges{display:-webkit-box;display:-ms-flexbox;display:flex;gap:5px;-ms-flex-wrap:wrap;flex-wrap:wrap;margin-top:9px}
.det-score{text-align:center;background:var(--bg);border-radius:10px;padding:10px 16px;-ms-flex-negative:0;flex-shrink:0}
.det-score-num{font-size:34px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.det-score-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-top:3px}
.det-contact{display:-webkit-box;display:-ms-flexbox;display:flex;gap:8px;-ms-flex-wrap:wrap;flex-wrap:wrap;margin-top:10px}
.cta-btn{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;-webkit-transition:opacity 0.1s;transition:opacity 0.1s;text-decoration:none;border:1px solid;font-family:inherit;-webkit-tap-highlight-color:transparent}
.cta-btn:hover{opacity:0.82}
.cta-tel{background:var(--gbg);color:var(--g);border-color:var(--gbd)}
.cta-web{background:var(--blbg);color:var(--bl);border-color:var(--blbd)}
.cta-ig{background:var(--pbg);color:var(--p);border-color:var(--pbd)}
.det-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.det-block{background:var(--white);border:1px solid var(--b1);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.det-block-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--t3);margin-bottom:10px}
.info-row{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;-webkit-box-align:center;-ms-flex-align:center;align-items:center;padding:5px 0;font-size:13px;border-bottom:1px solid var(--b1)}
.info-row:last-child{border-bottom:none}
.ir-k{color:var(--t2);font-size:12px}
.ir-v{font-weight:600;color:var(--t1);text-align:right;max-width:58%}
.pitch{background:var(--gbg);border:1px solid var(--gbd);border-radius:var(--radius-sm);padding:13px}
.pitch-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:var(--g);margin-bottom:7px}
.pitch-txt{font-size:13px;color:var(--t1);line-height:1.65}
.problem{background:var(--rbg);border:1px solid var(--rbd);border-radius:var(--radius-sm);padding:13px;margin-bottom:10px}
.problem-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:var(--r);margin-bottom:7px}

/* PAGINATION */
.pagination{display:-webkit-box;display:-ms-flexbox;display:flex;gap:6px;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;padding:14px 0}
.pg-btn{padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--b2);background:var(--white);font-size:12px;font-weight:500;color:var(--t2);font-family:inherit;-webkit-appearance:none;appearance:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pg-btn:hover:not(:disabled){background:var(--bg)}
.pg-btn:disabled{opacity:0.35;cursor:default}
.pg-info{font-size:11px;color:var(--t3);margin:0 6px}

/* GRID CHARTS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.chart-wrap{background:var(--white);border:1px solid var(--b1);border-radius:var(--radius);padding:14px}

/* MOBILE */
@media(max-width:768px){
  .sidebar{left:calc(-1 * var(--sidebar))}
  .sidebar.open{left:0}
  .sidebar-overlay{display:none}
  .sidebar-overlay.show{display:block}
  .main{margin-left:0}
  .menu-btn{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .kpi-grid .kpi:last-child{grid-column:1/3}

/* ── UTILS ── */
function x(s){
  if(s==null)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function n(v){return v==null?'0':String(v);}
function sColor(ls){return ls>=80?'var(--r)':ls>=60?'var(--a)':'var(--gr)';}
function sBg(ls){return ls>=80?'var(--rbg)':ls>=60?'var(--abg)':'var(--grbg)';}
function rbCls(i){return i===0?'rb-gold':i===1?'rb-silver':i===2?'rb-bronze':'rb-rest';}
function priCls(p){return p==='Alta prioridad'?'card-alta':p==='Media prioridad'?'card-media':'card-baja';}

function bPri(p){
  if(p==='Alta prioridad')return '<span class="badge b-r">Alta prioridad</span>';
  if(p==='Media prioridad')return '<span class="badge b-a">Media prioridad</span>';
  if(p==='Baja prioridad')return '<span class="badge b-gr">Baja prioridad</span>';
  return '';
}
function bIG(m){
  if(!m.ig)return '<span class="badge b-r">Sin Instagram</span>';
  if(m.fol<100)return '<span class="badge b-r">Muy pocos seg.</span>';
  if(m.fol<300)return '<span class="badge b-a">IG d&#233;bil</span>';
  if(m.bio==='Mala')return '<span class="badge b-co">Bio sin optimizar</span>';
  if(m.pos<15)return '<span class="badge b-a">Inactivo</span>';
  return '<span class="badge b-g">IG activo</span>';
}
function bOpp(o){
  if(!o)return '';
  var map={'Oportunidad muy alta':'b-r','Oportunidad alta':'b-a','Oportunidad media':'b-bl','Oportunidad baja':'b-gr'};
  return '<span class="badge '+(map[o]||'b-gr')+'">'+x(o)+'</span>';
}
function bGap(g){
  if(g==='Gap alto')return '<span class="badge b-r">GAP alto</span>';
  if(g==='Gap medio')return '<span class="badge b-a">GAP medio</span>';
  return '<span class="badge b-gr">GAP bajo</span>';
}

/* ── NAV ── */
function nav(v,m){
  closeSidebar();
  vw=v;pg=1;
  var ids=['nav-dashboard','nav-top','nav-noig','nav-weakig','nav-all'];
  for(var i=0;i<ids.length;i++) document.getElementById(ids[i]).classList.remove('active');
  var map={dashboard:'nav-dashboard',top:'nav-top',noig:'nav-noig',weakig:'nav-weakig',all:'nav-all'};
  if(map[v]) document.getElementById(map[v]).classList.add('active');

  var ttl=document.getElementById('t-title');
  var sub=document.getElementById('t-sub');
  var act=document.getElementById('t-actions');
  var cnt=document.getElementById('content');
  act.innerHTML='';

  if(v==='dashboard'){
    ttl.textContent='Dashboard';
    sub.textContent=D.length+' cl\xednicas analizadas \xb7 Pen\xednsula \xb7 300km';
    cnt.innerHTML=renderDashboard();
  } else if(v==='top'){
    ttl.textContent='Top oportunidades';
    sub.textContent='Ordenadas por lead score \xb7 Contactar en este orden';
    fCity='all';
    cnt.innerHTML=renderTop();
  } else if(v==='noig'){
    ttl.textContent='Sin Instagram';
    sub.textContent='Captaci\xf3n directa \xb7 '+D.filter(function(d){return !d.ig;}).length+' cl\xednicas';
    cnt.innerHTML=renderNoIG();
  } else if(v==='weakig'){
    ttl.textContent='Instagram mejorable';
    sub.textContent='Perfil existente pero sin resultados';
    cnt.innerHTML=renderWeakIG();
  } else if(v==='all'){
    ttl.textContent='Todas las cl\xednicas';
    sub.textContent=D.length+' cl\xednicas en base de datos';
    cnt.innerHTML=renderAll();
  } else if(v==='detail'){
    ttl.textContent=m.n;
    sub.textContent=m.c+' \xb7 '+m.p;
    act.innerHTML='<button class="btn" onclick="history.go(-1)" style="display:inline-block">&#8592; Volver</button>';
    cnt.innerHTML=renderDetail(m);
    window.scrollTo(0,0);
  }
}

    +'<div><div class="cs-val">'+m.rev+'</div><div class="cs-lbl">Rese&#241;as</div></div>'
    +'<div><div class="cs-val">'+(m.ig?(m.fol||0).toLocaleString():'0')+'</div><div class="cs-lbl">Seguidores</div></div>'
    +'</div>'
    +'<div class="card-foot"><div><div class="card-srv-lbl">Servicio recomendado</div><div class="card-srv">'+srv+'</div></div>'
    +'<span class="card-link">Ver &#8594;</span></div></div>';
}

/* ── TOP RANKING ── */
function renderTop(){
  var list=D.filter(function(d){return d.ls>=60;});
  var cities=[];var seen={};
  for(var i=0;i<list.length;i++){var c=list[i].c;if(c&&!seen[c]){cities.push(c);seen[c]=1;}}
  cities.sort();
  var fl=fCity==='all'?list:list.filter(function(d){return d.c===fCity;});
  var start=(pg-1)*PAGE;var slice=fl.slice(start,start+PAGE);var total=Math.ceil(fl.length/PAGE);

  var chips='<span class="chip '+(fCity==='all'?'on':'')+'" onclick="fcity(\'all\')">Todas</span>';
  for(var ci=0;ci<cities.length;ci++){
    var city=cities[ci];
    chips+='<span class="chip '+(fCity===city?'on':'')+'" onclick="fcity(\''+x(city)+'\')">'+x(city)+'</span>';
  }

  var rows='';
  for(var ri=0;ri<slice.length;ri++){
    var m=slice[ri];var idx=start+ri;
    rows+='<div class="tbl-row" onclick="openDetail('+m.id+')" tabindex="0" role="button">'
      +'<div class="rb '+rbCls(idx)+'">'+( idx+1)+'</div>'
      +'<div class="tr-info"><div class="tr-name">'+x(m.n)+'</div><div class="tr-meta">'+x(m.c)+' &#183; &#9742; '+x(m.tel||'&#8212;')+'</div></div>'
      +'<div class="tr-badges">'+bPri(m.pri)+bIG(m)+bOpp(m.or)+'</div>'
      +'<div class="tr-score"><div class="tr-score-val" style="color:'+sColor(m.ls)+'">'+m.ls+'</div><div class="tr-score-lbl">score</div></div>'
      +'</div>';
  }

  var pag=total>1?'<div class="pagination">'
    +'<button class="pg-btn" '+(pg<=1?'disabled':'')+' onclick="goPg('+(pg-1)+')">&#8592; Ant.</button>'
    +'<span class="pg-info">'+pg+' / '+total+' &#183; '+fl.length+' leads</span>'
    +'<button class="pg-btn" '+(pg>=total?'disabled':'')+' onclick="goPg('+(pg+1)+')">Sig. &#8594;</button>'
    +'</div>':'';

  return '<div class="banner banner-r"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><div><b>'+list.length+' leads con score &#8805;60.</b> Ordenados por potencial real de cierre. Empieza por arriba.</div></div>'
    +'<div class="filter-bar"><span class="filter-lbl">Ciudad:</span>'+chips+'</div>'
    +'<div class="tbl"><div class="tbl-hdr"><div style="width:26px"></div><div style="flex:1">Cl&#237;nica</div><div style="min-width:260px">Estado</div><div style="min-width:48px;text-align:right">Score</div></div>'+rows+'</div>'+pag;
}

function fcity(c){fCity=c;pg=1;document.getElementById('content').innerHTML=renderTop();}
function goPg(p){pg=p;document.getElementById('content').innerHTML=vw==='top'?renderTop():vw==='all'?renderAll():renderTop();}

/* ── SIN IG ── */
function renderNoIG(){
  var list=D.filter(function(d){return !d.ig;});
  var rows='';
  for(var i=0;i<list.length;i++){
    var m=list[i];
    rows+='<div class="tbl-row" onclick="openDetail('+m.id+')" tabindex="0" role="button">'
      +'<div class="rb '+rbCls(i)+'">'+( i+1)+'</div>'
      +'<div class="tr-info"><div class="tr-name">'+x(m.n)+'</div><div class="tr-meta">'+x(m.c)+' &#183; '+x(m.tel||'sin tel&#233;fono')+'</div></div>'
      +'<div class="tr-badges">'+bPri(m.pri)+bOpp(m.or)+(m.gap?bGap(m.gap):'')+'</div>'
      +'<div style="text-align:right;min-width:88px;font-size:12px"><div style="font-weight:700">'+m.rat+'&#9733;</div><div style="color:var(--t3)">'+m.rev+' rese&#241;as</div></div>'
      +'<div class="tr-score"><div class="tr-score-val" style="color:'+sColor(m.ls)+'">'+m.ls+'</div><div class="tr-score-lbl">score</div></div>'
      +'</div>';
  }
  return '<div class="banner banner-r"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><line x1="4" y1="4" x2="20" y2="20"/></svg><div><b>'+list.length+' cl&#237;nicas sin Instagram.</b> El problema es obvio y la soluci&#243;n concreta. Son las llamadas m&#225;s f&#225;ciles de cerrar.</div></div>'
    +'<div class="tbl"><div class="tbl-hdr"><div style="width:26px"></div><div style="flex:1">Cl&#237;nica &#183; Tel&#233;fono</div><div style="min-width:200px">Prioridad &#183; GAP</div><div style="min-width:88px;text-align:right">Rating</div><div style="min-width:48px;text-align:right">Score</div></div>'+rows+'</div>';
}

/* ── IG DEBIL ── */
function renderWeakIG(){
  var list=D.filter(function(d){return d.ig&&(d.fol<300||d.pos<20||d.bio==='Mala');});
  var rows='';
  for(var i=0;i<list.length;i++){
    var m=list[i];
    var iss='';
    if(m.fol<100)iss+='<span class="badge b-r">Muy pocos seg.</span>';
    else if(m.fol<300)iss+='<span class="badge b-a">Pocos seg.</span>';
    if(m.pos<10)iss+='<span class="badge b-r">Casi inactivo</span>';
    else if(m.pos<20)iss+='<span class="badge b-a">Poca actividad</span>';
    if(m.bio==='Mala')iss+='<span class="badge b-co">Bio sin optimizar</span>';
    rows+='<div class="tbl-row" onclick="openDetail('+m.id+')" tabindex="0" role="button">'
      +'<div class="rb '+rbCls(i)+'">'+( i+1)+'</div>'
      +'<div class="tr-info"><div class="tr-name">'+x(m.n)+'</div><div class="tr-meta">'+x(m.c)+' &#183; '+x(m.tel||'&#8212;')+'</div></div>'
      +'<div class="tr-badges">'+iss+'</div>'
      +'<div style="text-align:right;min-width:100px;font-size:12px"><div style="font-weight:700">'+(m.fol||0).toLocaleString()+' seg.</div><div style="color:var(--t3)">'+(m.pos||0)+' posts</div></div>'
      +'<div class="tr-score"><div class="tr-score-val" style="color:'+sColor(m.ls)+'">'+m.ls+'</div><div class="tr-score-lbl">score</div></div>'
      +'</div>';
  }
  return '<div class="banner banner-a"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div><b>'+list.length+' cl&#237;nicas con Instagram sin aprovechar.</b> Ya validan las redes &#8212; solo necesitan estrategia. La venta es m&#225;s r&#225;pida.</div></div>'
    +'<div class="tbl"><div class="tbl-hdr"><div style="width:26px"></div><div style="flex:1">Cl&#237;nica &#183; Ciudad</div><div style="min-width:220px">Problemas</div><div style="min-width:100px;text-align:right">Seg. &#183; Posts</div><div style="min-width:48px;text-align:right">Score</div></div>'+rows+'</div>';
}

/* ── ALL ── */
function renderAll(){
  var start=(pg-1)*PAGE;var slice=D.slice(start,start+PAGE);var total=Math.ceil(D.length/PAGE);
  var rows='';
  for(var i=0;i<slice.length;i++){
    var m=slice[i];var idx=start+i;
    rows+='<div class="tbl-row" onclick="openDetail('+m.id+')" tabindex="0" role="button">'
      +'<div class="rb rb-rest">'+( idx+1)+'</div>'
      +'<div class="tr-info"><div class="tr-name">'+x(m.n)+'</div><div class="tr-meta">'+x(m.c)+' &#183; '+x(m.tel||'&#8212;')+'</div></div>'
      +'<div class="tr-badges">'+bPri(m.pri)+bIG(m)+bOpp(m.or)+'</div>'
      +'<div class="tr-score"><div class="tr-score-val" style="color:'+sColor(m.ls)+'">'+m.ls+'</div><div class="tr-score-lbl">score</div></div>'
      +'</div>';
  }
  return '<div class="tbl"><div class="tbl-hdr"><div style="width:26px"></div><div style="flex:1">Cl&#237;nica</div><div style="min-width:260px">Estado</div><div style="min-width:48px;text-align:right">Score</div></div>'+rows+'</div>'
    +'<div class="pagination">'
    +'<button class="pg-btn" '+(pg<=1?'disabled':'')+' onclick="goPg('+(pg-1)+')">&#8592; Anterior</button>'
    +'<span class="pg-info">'+pg+' / '+total+' &#183; '+D.length+' cl&#237;nicas</span>'
    +'<button class="pg-btn" '+(pg>=total?'disabled':'')+' onclick="goPg('+(pg+1)+')">Siguiente &#8594;</button>'
    +'</div>';
}

/* ── DETAIL ── */
function renderDetail(m){
  var c=sColor(m.ls);

  var igBlock='';
  if(m.ig){
    igBlock='<div class="info-row"><span class="ir-k">Seguidores</span><span class="ir-v">'+(m.fol||0).toLocaleString()+'</span></div>'
      +'<div class="info-row"><span class="ir-k">Publicaciones</span><span class="ir-v">'+(m.pos||0)+'</span></div>'
      +'<div class="info-row"><span class="ir-k">Calidad bio</span><span class="ir-v">'+x(m.bio||'&#8212;')+'</span></div>'
      +'<div class="info-row"><span class="ir-k">Oportunidad</span><span class="ir-v">'+x(m.or||'&#8212;')+'</span></div>';
  } else {
    igBlock='<div style="padding:16px 0;text-align:center">'
      +'<div style="font-size:26px;margin-bottom:6px">&#128244;</div>'
      +'<div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:3px">Sin cuenta de Instagram</div>'
      +'<div style="font-size:12px;color:var(--t3)">Oportunidad de captaci&#243;n directa</div></div>';
  }

  var problem=m.ig
    ?'Tienen Instagram pero no genera pacientes. El perfil muestra '
      +(m.fol<100?'solo '+m.fol+' seguidores':m.fol<300?m.fol+' seguidores (por debajo del potencial de la zona)':m.pos<20?m.pos+' publicaciones totales (perfil inactivo)':'actividad por debajo de su capacidad')
      +(m.bio==='Mala'?' con bio sin llamada a la acci&#243;n ni servicios':'')+'. Tienen presencia digital sin estrategia de captaci&#243;n.'
    :x(m.n)+' tiene '+m.rat+' estrellas y '+m.rev+' rese&#241;as en Google. Esa reputaci&#243;n solo existe para quien ya los busca. Sin Instagram, no aparecen donde los pacientes j&#243;venes deciden antes de llamar. Su competencia en '+x(m.c)+' ya est&#225; ah&#237;.';

  var pitch=m.ig
    ?'"Hola, llamo de [agencia]. He revisado su perfil de Instagram &#8212; tienen '+m.fol+' seguidores y '+m.pos+' publicaciones. El perfil existe pero no est&#225; generando consultas nuevas. Cl&#237;nicas similares en '+x(m.c)+' con una estrategia de contenido activa reciben 3&#8211;5 consultas nuevas al mes desde redes sociales. &#191;Le gustar&#237;a ver un an&#225;lisis en 10 minutos de c&#243;mo lo conseguir&#237;amos?"'
    :'"Hola, llamo de [agencia]. He visto su cl&#237;nica en Google &#8212; tienen '+m.rev+' rese&#241;as con '+m.rat+' de valoraci&#243;n, es una reputaci&#243;n excelente. El problema es que en Instagram no aparecen, y ah&#237; es donde los pacientes de 25&#8211;45 a&#241;os buscan ahora. Sus competidores en '+x(m.c)+' ya est&#225;n captando ese tr&#225;fico. &#191;Le muestro lo que se est&#225; perdiendo?"';

  var ctaHtml='';
  if(m.tel)ctaHtml+='<a class="cta-btn cta-tel" href="tel:'+x(m.tel)+'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>Llamar</a>';
  if(m.web&&m.web!=='#')ctaHtml+='<a class="cta-btn cta-web" href="'+x(m.web)+'" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>Web</a>';
  if(m.ig&&m.igu)ctaHtml+='<a class="cta-btn cta-ig" href="'+x(m.igu)+'" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>Instagram</a>';

  return '<div class="det-hdr">'
    +'<div class="det-top"><div style="flex:1;min-width:0"><div class="det-name">'+x(m.n)+'</div><div class="det-city">'+x(m.c)+' &#183; '+x(m.p)+'</div>'
    +'<div class="det-badges">'+bPri(m.pri)+bIG(m)+bOpp(m.or)+(m.gap?bGap(m.gap):'')+'</div></div>'
    +'<div class="det-score"><div class="det-score-num" style="color:'+c+'">'+m.ls+'</div><div class="det-score-lbl">lead score</div>'
    +'<div style="margin-top:7px;width:72px"><div class="sbar-track" style="height:5px"><div class="sbar-fill" style="width:'+m.ls+'%;background:'+c+'"></div></div></div></div></div>'
    +'<div class="det-contact">'+ctaHtml+'</div></div>'
    +'<div class="det-2col">'
    +'<div>'
    +'<div class="det-block"><div class="det-block-title">Datos generales</div>'
    +'<div class="info-row"><span class="ir-k">Ciudad</span><span class="ir-v">'+x(m.c)+', '+x(m.p)+'</span></div>'
    +'<div class="info-row"><span class="ir-k">Tel&#233;fono</span><span class="ir-v" style="color:var(--g)">'+x(m.tel||'&#8212;')+'</span></div>'
    +'<div class="info-row"><span class="ir-k">Rating Google</span><span class="ir-v">'+m.rat+' &#9733; ('+m.rev+' rese&#241;as)</span></div>'
    +'<div class="info-row"><span class="ir-k">Score marketing</span><span class="ir-v">'+m.sc+'/10</span></div>'
    +'<div class="info-row"><span class="ir-k">Tipo de lead</span><span class="ir-v">'+x(m.tl||'&#8212;')+'</span></div>'
    +'</div>'
    +'<div class="det-block"><div class="det-block-title">Estado en Instagram</div>'+igBlock+'</div>'
    +'</div>'
    +'<div>'
    +'<div class="det-block"><div class="det-block-title">Diagn&#243;stico del problema</div>'
    +'<div class="problem"><div class="problem-lbl">&#9888; Problema detectado</div><div style="font-size:13px;color:var(--t1);line-height:1.65">'+problem+'</div></div>'
    +'</div>'
    +'<div class="det-block"><div class="det-block-title">Oportunidad comercial</div>'
    +'<div class="info-row"><span class="ir-k">Oportunidad redes</span><span class="ir-v">'+x(m.or||'&#8212;')+'</span></div>'
    +'<div class="info-row"><span class="ir-k">Oportunidad web</span><span class="ir-v">'+x(m.ow||'&#8212;')+'</span></div>'
    +'<div class="info-row"><span class="ir-k">GAP competitivo</span><span class="ir-v">'+x(m.gap||'&#8212;')+'</span></div>'
    +'<div class="info-row"><span class="ir-k">Prioridad</span><span class="ir-v">'+x(m.pri||'&#8212;')+'</span></div>'
    +'</div></div></div>'
    +'<div class="det-block"><div class="det-block-title">Servicio recomendado &#183; Argumento de venta</div>'
    +(m.srv?'<div style="margin-bottom:12px"><span class="badge b-p" style="font-size:12px;padding:5px 14px">'+x(m.srv)+'</span></div>':'')
    +'<div class="pitch"><div class="pitch-lbl">Argumento para la llamada</div><div class="pitch-txt">'+pitch+'</div></div></div>'
    +(m.mot?'<div class="det-block"><div class="det-block-title">Motivo de oportunidad</div><div style="font-size:13px;color:var(--t1);line-height:1.65">'+x(m.mot)+'</div></div>':'');
}

init();
</script>
</body>
</html>
