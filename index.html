<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>LeadClinic</title>
<style>
html,body{margin:0;padding:0;-webkit-text-size-adjust:100%;text-size-adjust:100%}
*,*:before,*:after{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:14px;line-height:1.5;background:#F4F3EF;color:#111;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;border:none;background:none;padding:0}
input,select,textarea{font-family:inherit;-webkit-appearance:none;appearance:none}

:root{
  --bg:#F4F3EF;--w:#FFF;--s2:#F8F7F4;
  --b1:rgba(0,0,0,0.07);--b2:rgba(0,0,0,0.13);
  --t1:#111110;--t2:#6B6A65;--t3:#A09F9A;
  --r:#C1170D;--rbg:#FEF0EF;--rbd:#F5C4C0;
  --a:#9A5A08;--abg:#FDF3E3;--abd:#F5D49A;
  --g:#0A6640;--gbg:#E8F7EF;--gbd:#94D4B4;
  --bl:#1050A0;--blbg:#EAF0FB;--blbd:#9AB8EC;
  --p:#5A3FC0;--pbg:#F0EDFC;--pbd:#C0B0F0;
  --gr:#4A4A46;--grbg:#F1EFE9;--grbd:#C4C2BB;
  --co:#A83010;--cobg:#FDF0EB;--cobd:#F0B89A;
  --teal:#0A6B6B;--tealbg:#E6F7F7;--tealbd:#88CCCC;
  --sw:240px;
}

/* LAYOUT */
.app{display:-webkit-box;display:-ms-flexbox;display:flex;min-height:100vh;min-height:-webkit-fill-available}
.sidebar{width:var(--sw);-ms-flex-negative:0;flex-shrink:0;background:var(--w);border-right:1px solid var(--b1);display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;position:fixed;top:0;left:0;height:100vh;height:-webkit-fill-available;overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:200;-webkit-transition:left .25s ease;transition:left .25s ease}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:199;-webkit-tap-highlight-color:transparent}
.overlay.on{display:block}
.main{margin-left:var(--sw);-webkit-box-flex:1;-ms-flex:1;flex:1;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;min-height:100vh;min-width:0}

/* TOPBAR */
.topbar{background:var(--w);border-bottom:1px solid var(--b1);padding:11px 20px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;position:-webkit-sticky;position:sticky;top:0;z-index:100;gap:10px}
.tb-left{-webkit-box-flex:1;-ms-flex:1;flex:1;min-width:0}
.tb-title{font-size:15px;font-weight:700;color:var(--t1);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-size:11px;color:var(--t3);margin:0}
.tb-right{display:-webkit-box;display:-ms-flexbox;display:flex;gap:8px;-ms-flex-negative:0;flex-shrink:0;-webkit-box-align:center;-ms-flex-align:center;align-items:center}
.menu-btn{display:none;padding:7px 9px;background:none;border:1px solid var(--b2);border-radius:7px;color:var(--t2)}

/* SEARCH BAR */
.search-wrap{padding:12px 20px;background:var(--w);border-bottom:1px solid var(--b1)}
.search-inner{position:relative}
.search-ico{position:absolute;left:10px;top:50%;-webkit-transform:translateY(-50%);transform:translateY(-50%);pointer-events:none;color:var(--t3)}
.search-input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--b2);border-radius:8px;font-size:13px;color:var(--t1);background:var(--bg);outline:none;-webkit-appearance:none;appearance:none}
.search-input:focus{border-color:var(--bl);background:var(--w)}
.search-clear{position:absolute;right:10px;top:50%;-webkit-transform:translateY(-50%);transform:translateY(-50%);font-size:16px;color:var(--t3);cursor:pointer;display:none;padding:2px 4px}

/* CONTENT */
.content{padding:16px 20px;-webkit-box-flex:1;-ms-flex:1;flex:1;overflow-x:hidden}

/* SIDEBAR */
.logo-area{padding:16px 16px 13px;border-bottom:1px solid var(--b1)}
.logo-row{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px;margin-bottom:3px}
.logo-icon{width:27px;height:27px;background:var(--t1);border-radius:7px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;-ms-flex-negative:0;flex-shrink:0}
.logo-name{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.logo-tag{font-size:10px;color:var(--t3);letter-spacing:.6px;text-transform:uppercase;padding-left:35px}

.nav-sec{padding:10px 10px 2px}
.nav-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;padding:4px 8px;font-weight:700}
.nav-btn{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--t2);-webkit-transition:background .12s,color .12s;transition:background .12s,color .12s;margin-bottom:1px;width:100%;text-align:left;-webkit-tap-highlight-color:transparent}
.nav-btn:hover{background:var(--bg);color:var(--t1)}
.nav-btn.on{background:var(--t1);color:#fff}
.nav-btn.on .nav-cnt{background:rgba(255,255,255,0.2);color:#fff}
.nav-ico{width:15px;height:15px;-ms-flex-negative:0;flex-shrink:0;opacity:.6}
.nav-btn.on .nav-ico{opacity:1}
.nav-cnt{margin-left:auto;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--bg);color:var(--t2)}
.nav-urg .nav-cnt{background:var(--rbg);color:var(--r)}

.sb-footer{margin-top:auto;padding:13px;border-top:1px solid var(--b1)}
.sb-f-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px;font-weight:700}
.sb-row{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;-webkit-box-align:center;-ms-flex-align:center;align-items:center;margin-bottom:5px}
.sb-k{font-size:12px;color:var(--t2)}
.sb-v{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}

/* BUTTONS */
.btn{display:inline-block;padding:7px 13px;border-radius:7px;border:1px solid var(--b2);background:var(--w);font-size:12px;font-weight:600;color:var(--t1);-webkit-transition:background .12s;transition:background .12s;white-space:nowrap;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn:hover{background:var(--bg)}
.btn-dark{background:var(--t1);color:#fff;border-color:var(--t1)}
.btn-dark:hover{opacity:.88;background:var(--t1)}
.btn-g{background:var(--gbg);color:var(--g);border-color:var(--gbd)}
.btn-r{background:var(--rbg);color:var(--r);border-color:var(--rbd)}

/* KPI GRID — CLICKABLE */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--w);border:1px solid var(--b1);border-radius:10px;padding:14px;cursor:pointer;-webkit-transition:all .15s;transition:all .15s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden}
.kpi:hover{border-color:var(--b2);-webkit-transform:translateY(-1px);transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,0.08)}
.kpi:active{-webkit-transform:none;transform:none}
.kpi-arrow{position:absolute;bottom:10px;right:10px;font-size:11px;color:var(--t3);opacity:0;-webkit-transition:opacity .15s;transition:opacity .15s}
.kpi:hover .kpi-arrow{opacity:1}
.kpi-ico{width:30px;height:30px;border-radius:8px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;margin-bottom:9px}
.kpi-val{font-size:26px;font-weight:700;line-height:1;letter-spacing:-1px;margin-bottom:3px;font-variant-numeric:tabular-nums}
.kpi-lbl{font-size:11px;color:var(--t2);font-weight:600}
.kpi-sub{font-size:10px;color:var(--t3);margin-top:2px}
.kpi-r .kpi-ico{background:var(--rbg)} .kpi-r .kpi-val{color:var(--r)}
.kpi-a .kpi-ico{background:var(--abg)} .kpi-a .kpi-val{color:var(--a)}
.kpi-g .kpi-ico{background:var(--gbg)} .kpi-g .kpi-val{color:var(--g)}
.kpi-bl .kpi-ico{background:var(--blbg)} .kpi-bl .kpi-val{color:var(--bl)}
.kpi-tl .kpi-ico{background:var(--tealbg)} .kpi-tl .kpi-val{color:var(--teal)}

/* BANNERS */
.banner{border-radius:9px;padding:10px 14px;margin-bottom:13px;font-size:12px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:flex-start;-ms-flex-align:flex-start;align-items:flex-start;gap:9px;line-height:1.55}
.banner b{font-weight:700}
.banner-r{background:var(--rbg);border:1px solid var(--rbd);color:var(--r)}
.banner-g{background:var(--gbg);border:1px solid var(--gbd);color:var(--g)}
.banner-a{background:var(--abg);border:1px solid var(--abd);color:var(--a)}
.banner-bl{background:var(--blbg);border:1px solid var(--blbd);color:var(--bl)}

/* SECTION */
.sec-hdr{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:baseline;-ms-flex-align:baseline;align-items:baseline;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;margin-bottom:10px;gap:8px;-ms-flex-wrap:wrap;flex-wrap:wrap}
.sec-title{font-size:13px;font-weight:700;color:var(--t1)}
.sec-meta{font-size:11px;color:var(--t3)}
.sec-link{font-size:11px;color:var(--bl);font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* TABLE */
.tbl{background:var(--w);border:1px solid var(--b1);border-radius:10px;overflow:hidden;margin-bottom:16px}
.tbl-hdr{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;padding:8px 14px;background:var(--s2);border-bottom:1px solid var(--b1);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3)}
.tbl-row{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--b1);cursor:pointer;-webkit-transition:background .1s;transition:background .1s;-webkit-tap-highlight-color:transparent;position:relative}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover,.tbl-row:focus{background:var(--bg);outline:none}
.tbl-row:active{background:var(--s2)}
.contacted-row{opacity:.55}
.contacted-row::after{content:'Contactada';position:absolute;right:14px;top:50%;-webkit-transform:translateY(-50%);transform:translateY(-50%);font-size:10px;font-weight:700;color:var(--g);background:var(--gbg);padding:2px 8px;border-radius:20px;border:1px solid var(--gbd)}
.tr-info{-webkit-box-flex:1;-ms-flex:1;flex:1;min-width:0}
.tr-name{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-meta{font-size:11px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-badges{display:-webkit-box;display:-ms-flexbox;display:flex;gap:4px;-ms-flex-wrap:wrap;flex-wrap:wrap;-ms-flex-negative:0;flex-shrink:0;max-width:260px}
.tr-sc{text-align:right;-ms-flex-negative:0;flex-shrink:0;min-width:46px}
.tr-sc-val{font-size:19px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.tr-sc-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}

/* RANK */
.rb{width:25px;height:25px;border-radius:50%;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;font-size:10px;font-weight:700;-ms-flex-negative:0;flex-shrink:0;font-variant-numeric:tabular-nums}
.rb-1{background:var(--abg);color:var(--a)}
.rb-2{background:var(--grbg);color:var(--gr)}
.rb-3{background:var(--cobg);color:var(--co)}
.rb-n{background:var(--bg);color:var(--t3)}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;line-height:1.6}
.b-r{background:var(--rbg);color:var(--r)}
.b-a{background:var(--abg);color:var(--a)}
.b-g{background:var(--gbg);color:var(--g)}
.b-bl{background:var(--blbg);color:var(--bl)}
.b-p{background:var(--pbg);color:var(--p)}
.b-gr{background:var(--grbg);color:var(--gr)}
.b-co{background:var(--cobg);color:var(--co)}
.b-tl{background:var(--tealbg);color:var(--teal)}

/* SCORE BAR */
.sbar{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px}
.sbar-track{-webkit-box-flex:1;-ms-flex:1;flex:1;height:4px;background:var(--b2);border-radius:2px;overflow:hidden}
.sbar-fill{height:4px;border-radius:2px}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.card{background:var(--w);border:1px solid var(--b1);border-radius:10px;padding:14px;cursor:pointer;-webkit-transition:all .15s;transition:all .15s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;display:block;border-left-width:3px}
.card:hover{box-shadow:0 3px 14px rgba(0,0,0,0.08);border-color:var(--b2)}
.card:active{background:var(--bg)}
.c-alta{border-left-color:var(--r)}
.c-media{border-left-color:var(--a)}
.c-baja{border-left-color:var(--grbd)}
.card-top{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;-webkit-box-align:flex-start;-ms-flex-align:flex-start;align-items:flex-start;margin-bottom:9px;gap:8px}
.card-name{font-size:13px;font-weight:700;color:var(--t1);line-height:1.3}
.card-city{font-size:11px;color:var(--t3);margin-top:2px}
.card-sc{text-align:center;border-radius:8px;padding:5px 9px;-ms-flex-negative:0;flex-shrink:0}
.card-sc-num{font-size:21px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.card-sc-lbl{font-size:9px;opacity:.7;text-transform:uppercase;letter-spacing:.4px;margin-top:1px}
.card-badges{display:-webkit-box;display:-ms-flexbox;display:flex;gap:4px;-ms-flex-wrap:wrap;flex-wrap:wrap;margin-bottom:9px}
.card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;border-top:1px solid var(--b1);padding-top:9px}
.cs-v{font-size:13px;font-weight:700;color:var(--t1);text-align:center;font-variant-numeric:tabular-nums}
.cs-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;text-align:center;margin-top:1px}
.card-foot{margin-top:9px;border-top:1px solid var(--b1);padding-top:8px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;-webkit-box-align:flex-end;-ms-flex-align:flex-end;align-items:flex-end;gap:6px}
.card-srv-l{font-size:10px;color:var(--t3)}
.card-srv{font-size:11px;font-weight:600;color:var(--t1);margin-top:1px;line-height:1.3}
.card-link{font-size:11px;color:var(--bl);font-weight:700;white-space:nowrap}

/* FILTER BAR */
.filter-bar{background:var(--w);border:1px solid var(--b1);border-radius:9px;padding:9px 12px;margin-bottom:13px;display:-webkit-box;display:-ms-flexbox;display:flex;gap:6px;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-ms-flex-wrap:wrap;flex-wrap:wrap}
.filter-lbl{font-size:11px;color:var(--t2);font-weight:700;white-space:nowrap}
.chip{display:inline-block;padding:4px 11px;border-radius:20px;border:1px solid var(--b2);background:transparent;font-size:11px;font-weight:600;cursor:pointer;color:var(--t2);-webkit-transition:all .1s;transition:all .1s;-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:var(--t1);color:var(--t1)}
.chip.on{background:var(--t1);color:#fff;border-color:var(--t1)}

/* CHARTS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.chart-box{background:var(--w);border:1px solid var(--b1);border-radius:10px;padding:13px}
.city-chart{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;gap:8px}
.cc-row{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:8px}
.cc-lbl{font-size:12px;font-weight:600;color:var(--t1);min-width:80px}
.cc-track{-webkit-box-flex:1;-ms-flex:1;flex:1;height:19px;background:var(--bg);border-radius:4px;overflow:hidden}
.cc-bar{height:19px;border-radius:4px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;padding-left:7px;min-width:24px}
.cc-n{font-size:11px;color:var(--t3);min-width:26px;text-align:right}

/* PAGINATION */
.pagination{display:-webkit-box;display:-ms-flexbox;display:flex;gap:6px;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;padding:12px 0}
.pg-btn{padding:6px 13px;border-radius:7px;border:1px solid var(--b2);background:var(--w);font-size:12px;font-weight:600;color:var(--t2);-webkit-appearance:none;appearance:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pg-btn:hover:not(:disabled){background:var(--bg)}
.pg-btn:disabled{opacity:.3;cursor:default}
.pg-info{font-size:11px;color:var(--t3);margin:0 5px}

/* DETAIL */
.det-hdr{background:var(--w);border:1px solid var(--b1);border-radius:10px;padding:16px;margin-bottom:11px}
.det-top{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:flex-start;-ms-flex-align:flex-start;align-items:flex-start;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;gap:10px;margin-bottom:11px}
.det-name{font-size:17px;font-weight:700;color:var(--t1);line-height:1.25;letter-spacing:-.3px}
.det-city{font-size:13px;color:var(--t2);margin-top:3px}
.det-badges{display:-webkit-box;display:-ms-flexbox;display:flex;gap:5px;-ms-flex-wrap:wrap;flex-wrap:wrap;margin-top:9px}
.det-sc{text-align:center;background:var(--bg);border-radius:9px;padding:10px 15px;-ms-flex-negative:0;flex-shrink:0}
.det-sc-num{font-size:32px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.det-sc-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.det-cta{display:-webkit-box;display:-ms-flexbox;display:flex;gap:7px;-ms-flex-wrap:wrap;flex-wrap:wrap;margin-top:11px}
.cta{display:-webkit-inline-box;display:-ms-inline-flexbox;display:inline-flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:5px;padding:8px 13px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;-webkit-transition:opacity .1s;transition:opacity .1s;text-decoration:none;border:1px solid;font-family:inherit;-webkit-tap-highlight-color:transparent}
.cta:hover{opacity:.82}
.cta-tel{background:var(--gbg);color:var(--g);border-color:var(--gbd)}
.cta-web{background:var(--blbg);color:var(--bl);border-color:var(--blbd)}
.cta-ig{background:var(--pbg);color:var(--p);border-color:var(--pbd)}
.cta-wa{background:#E8F7EF;color:#128C7E;border-color:#94D4B4}
.det-2col{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.det-blk{background:var(--w);border:1px solid var(--b1);border-radius:10px;padding:15px;margin-bottom:11px}
.det-blk-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:10px}
.info-row{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;-webkit-box-align:center;-ms-flex-align:center;align-items:center;padding:5px 0;font-size:13px;border-bottom:1px solid var(--b1)}
.info-row:last-child{border-bottom:none}
.ir-k{color:var(--t2);font-size:12px}
.ir-v{font-weight:600;color:var(--t1);text-align:right;max-width:58%}
.pitch-box{background:var(--gbg);border:1px solid var(--gbd);border-radius:8px;padding:13px}
.pitch-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--g);margin-bottom:7px}
.pitch-txt{font-size:13px;color:var(--t1);line-height:1.65}
.prob-box{background:var(--rbg);border:1px solid var(--rbd);border-radius:8px;padding:13px;margin-bottom:9px}
.prob-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--r);margin-bottom:7px}

/* CRM — NOTES + STATUS */
.crm-status{display:-webkit-box;display:-ms-flexbox;display:flex;gap:7px;-ms-flex-wrap:wrap;flex-wrap:wrap;margin-bottom:10px}
.status-btn{padding:6px 12px;border-radius:7px;border:1px solid var(--b2);background:var(--w);font-size:11px;font-weight:700;cursor:pointer;-webkit-transition:all .12s;transition:all .12s;-webkit-tap-highlight-color:transparent;font-family:inherit}
.status-btn.s-contactada{background:var(--gbg);color:var(--g);border-color:var(--gbd)}
.status-btn.s-interesada{background:var(--blbg);color:var(--bl);border-color:var(--blbd)}
.status-btn.s-descartada{background:var(--grbg);color:var(--gr);border-color:var(--grbd)}
.status-btn.s-cerrada{background:var(--pbg);color:var(--p);border-color:var(--pbd)}
.status-btn.active-status{box-shadow:0 0 0 2px currentColor}
.notes-area{width:100%;min-height:80px;padding:9px;border:1px solid var(--b2);border-radius:7px;font-size:13px;color:var(--t1);background:var(--bg);resize:vertical;outline:none;font-family:inherit;line-height:1.5}
.notes-area:focus{border-color:var(--bl);background:var(--w)}
.notes-saved{font-size:11px;color:var(--g);margin-top:4px;display:none}

/* PROGRESS BAR SECTION */
.prog-section{background:var(--w);border:1px solid var(--b1);border-radius:10px;padding:13px;margin-bottom:16px}
.prog-row{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;gap:10px;margin-bottom:8px}
.prog-row:last-child{margin-bottom:0}
.prog-lbl{font-size:11px;font-weight:600;color:var(--t2);min-width:100px}
.prog-track{-webkit-box-flex:1;-ms-flex:1;flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.prog-fill{height:7px;border-radius:4px}
.prog-n{font-size:11px;font-weight:700;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}

/* CONTACTED VIEW */
.empty-state{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-ico{font-size:36px;margin-bottom:10px}
.empty-title{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:4px}
.empty-sub{font-size:12px}

/* MOBILE */
@media(max-width:768px){
  .sidebar{left:calc(-1 * var(--sw))}
  .sidebar.open{left:0}
  .main{margin-left:0}
  .menu-btn{display:-webkit-box;display:flex}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .kpi-grid .kpi:last-child{grid-column:1/3}
  .card-grid{grid-template-columns:1fr}
  .det-2col{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
  .tr-badges{display:none}
  .topbar{padding:10px 14px}
  .content{padding:12px 14px}
  .search-wrap{padding:10px 14px}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .kpi-grid .kpi:last-child{grid-column:auto}
  .tbl-hdr{display:none}
  .det-sc-num{font-size:26px}
  .det-sc{padding:8px 11px}
}

.sidebar::-webkit-scrollbar-thumb{background:var(--grbd);border-radius:2px}

function crmKey(id){return 'lc_crm_'+id;}
function loadCRM(){
  try{
    for(var i=0;i<D.length;i++){
      var k=crmKey(D[i].id);
      var v=localStorage.getItem(k);
      if(v) CRM[D[i].id]=JSON.parse(v);
    }
  }catch(e){}
}
function saveCRM(id,data){
  CRM[id]=data;
  try{localStorage.setItem(crmKey(id),JSON.stringify(data));}catch(e){}
  updateCRMCounts();
}
function getCRM(id){return CRM[id]||{status:'',notes:'',ts:''};}

function x(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sc(ls){return ls>=80?'var(--r)':ls>=60?'var(--a)':'var(--gr)';}
function scBg(ls){return ls>=80?'var(--rbg)':ls>=60?'var(--abg)':'var(--grbg)';}
function rbCls(i){return i===0?'rb-1':i===1?'rb-2':i===2?'rb-3':'rb-n';}
function priCls(p){return p==='Alta prioridad'?'c-alta':p==='Media prioridad'?'c-media':'c-baja';}
function fmt(n){return(n||0).toLocaleString('es-ES');}

function bPri(p){
  if(p==='Alta prioridad')return '<span class="badge b-r">Alta prioridad</span>';
  if(p==='Media prioridad')return '<span class="badge b-a">Media prioridad</span>';
  if(p==='Baja prioridad')return '<span class="badge b-gr">Baja prioridad</span>';
  return '';
}
function bIG(m){
  if(!m.ig)return '<span class="badge b-r">Sin Instagram</span>';
  if(m.fol<100&&m.pos===0)return '<span class="badge b-a">IG no verificado</span>';
  if(m.fol<100)return '<span class="badge b-r">Muy pocos seg.</span>';
  if(m.fol<300)return '<span class="badge b-a">IG d&#233;bil</span>';
  if(m.bio==='Mala')return '<span class="badge b-co">Bio sin optimizar</span>';
  if(m.pos<15)return '<span class="badge b-a">Inactivo</span>';
  return '<span class="badge b-g">IG activo</span>';
}
function bOpp(o){
  if(!o)return '';
  var map={'Oportunidad muy alta':'b-r','Oportunidad alta':'b-a','Oportunidad media':'b-bl','Oportunidad baja':'b-gr'};
  return '<span class="badge '+(map[o]||'b-gr')+'">'+x(o)+'</span>';
}
function bGap(g){
  if(g==='Gap alto')return '<span class="badge b-r">GAP alto</span>';
  if(g==='Gap medio')return '<span class="badge b-a">GAP medio</span>';
  return '<span class="badge b-gr">GAP bajo</span>';
}
function statusLabel(s){
  var labels={contactada:'Contactada',interesada:'Interesada',descartada:'Descartada',cerrada:'&#127881; Cerrada'};
  return labels[s]||'';
}
function statusBadge(s){
  if(!s)return '';
  var cls={contactada:'b-g',interesada:'b-bl',descartada:'b-gr',cerrada:'b-p'};
  return '<span class="badge '+(cls[s]||'b-gr')+'">'+statusLabel(s)+'</span>';
}

/* ─── TOP RANKING ─── */
function renderTop(){
  var list=D.filter(function(d){return d.ls>=60;});
  list=filterBySearch(list);
  var cities=[];var seen={};
  for(var i=0;i<D.filter(function(d){return d.ls>=60;}).length;i++){var cv=D.filter(function(d){return d.ls>=60;})[i].c;if(cv&&!seen[cv]){cities.push(cv);seen[cv]=1;}}
  cities.sort();
  var fl=fCity==='all'?list:list.filter(function(d){return d.c===fCity;});
  var start=(pg-1)*PAGE;var slice=fl.slice(start,start+PAGE);var total=Math.ceil(fl.length/PAGE);
  var chips='<span class="chip '+(fCity==='all'?'on':'')+'" onclick="fcity(\'all\')">Todas</span>';
  for(var ci=0;ci<cities.length;ci++){var city=cities[ci];chips+='<span class="chip '+(fCity===city?'on':'')+'" onclick="fcity(\''+x(city)+'\')">'+x(city)+'</span>';}
  var rows='';for(var ri=0;ri<slice.length;ri++)rows+=tblRow(slice[ri],start+ri);
  var pag=total>1?'<div class="pagination"><button class="pg-btn" '+(pg<=1?'disabled':'')+' onclick="goPg('+(pg-1)+')">&#8592;</button><span class="pg-info">'+pg+'/'+total+' &#183; '+fl.length+' leads</span><button class="pg-btn" '+(pg>=total?'disabled':'')+' onclick="goPg('+(pg+1)+')">&#8594;</button></div>':'';
  return '<div class="banner banner-r"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><div><b>'+D.filter(function(d){return d.ls>=60;}).length+' leads con score &#8805;60.</b> Empieza por arriba. Las marcadas en gris ya fueron contactadas.</div></div>'
    +'<div class="filter-bar"><span class="filter-lbl">Ciudad:</span>'+chips+'</div>'
    +'<div class="tbl"><div class="tbl-hdr"><div style="width:25px"></div><div style="flex:1">Cl&#237;nica</div><div style="min-width:250px">Estado</div><div style="min-width:46px;text-align:right">Score</div></div>'+rows+'</div>'+pag;
}

        +(crm.notes?'<div class="tr-meta" style="color:var(--t2);font-style:italic;margin-top:2px">&#128221; '+x(crm.notes.substring(0,60))+(crm.notes.length>60?'...':'')+'</div>':'')
        +'</div>'
        +'<div class="tr-sc"><div class="tr-sc-val" style="color:'+sc(m.ls)+'">'+m.ls+'</div><div class="tr-sc-lbl">score</div></div>'
        +'</div>';
    }
    html+='</div>';
  }
  return html;
}

/* ─── PIPELINE ─── */
function renderPipeline(){
  var total=D.length;
  var statuses=['contactada','interesada','cerrada','descartada'];
  var counts={contactada:0,interesada:0,cerrada:0,descartada:0};
  Object.keys(CRM).forEach(function(k){var s=CRM[k].status;if(counts[s]!==undefined)counts[s]++;});
  var sinContactar=total-Object.keys(CRM).filter(function(k){return CRM[k].status;}).length;

  var stageColors={contactada:'var(--teal)',interesada:'var(--bl)',cerrada:'var(--p)',descartada:'var(--gr)'};
  var stageLabels={contactada:'Contactadas',interesada:'Interesadas',cerrada:'Cerradas',descartada:'Descartadas'};

  var progHtml='';
  progHtml+='<div class="prog-row"><span class="prog-lbl">Sin contactar</span><div class="prog-track"><div class="prog-fill" style="width:'+Math.round(sinContactar/total*100)+'%;background:var(--grbd)"></div></div><span class="prog-n" style="color:var(--gr)">'+sinContactar+'</span></div>';
  for(var si=0;si<statuses.length;si++){
    var s=statuses[si];var n=counts[s];
    progHtml+='<div class="prog-row"><span class="prog-lbl">'+stageLabels[s]+'</span><div class="prog-track"><div class="prog-fill" style="width:'+Math.round(n/total*100)+'%;background:'+stageColors[s]+'"></div></div><span class="prog-n" style="color:'+stageColors[s]+'">'+n+'</span></div>';
  }

  var cerradas=counts['cerrada'];
  var interesadas=counts['interesada'];
  var tasa=Object.keys(CRM).filter(function(k){return CRM[k].status;}).length>0?Math.round(cerradas/(Object.keys(CRM).filter(function(k){return CRM[k].status;}).length)*100):0;

  return '<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">'
    +'<div class="kpi kpi-bl"><div class="kpi-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--bl)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="kpi-val">'+sinContactar+'</div><div class="kpi-lbl">Por contactar</div></div>'
    +'<div class="kpi kpi-tl"><div class="kpi-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8"/><path d="M23 21v-2a4 4 0 00-3-3.87"/></svg></div><div class="kpi-val">'+counts.contactada+'</div><div class="kpi-lbl">Contactadas</div></div>'
    +'<div class="kpi kpi-g"><div class="kpi-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--g)" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="kpi-val">'+cerradas+'</div><div class="kpi-lbl">Cerradas</div></div>'
    +'<div class="kpi" style="cursor:default"><div class="kpi-ico" style="background:var(--pbg)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--p)" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div><div class="kpi-val" style="color:var(--p)">'+tasa+'%</div><div class="kpi-lbl">Tasa de cierre</div></div>'
    +'</div>'
    +'<div class="det-blk"><div class="det-blk-t">Embudo de ventas</div>'+progHtml+'</div>'
    +(interesadas>0?'<div class="banner banner-bl"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div><b>'+interesadas+' cl&#237;nicas interesadas.</b> Estas son tu prioridad ahora mismo &#8212; est&#225;n calientes. Entra en Contactadas y gestiona el seguimiento.</div></div>':'')
    +'<div class="banner banner-g"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/></svg><div>Hay <b>'+sinContactar+' cl&#237;nicas sin contactar</b> en la base de datos. Cada d&#237;a sin llamar es un lead que se enfr&#237;a.</div></div>';
}

/* ─── DETAIL ─── */
function renderDetail(m){
  var color=sc(m.ls);
  var crm=getCRM(m.id);

  var igBlock='';
  if(m.ig){
    igBlock='<div class="info-row"><span class="ir-k">Seguidores</span><span class="ir-v">'+fmt(m.fol)+'</span></div>'
      +'<div class="info-row"><span class="ir-k">Publicaciones</span><span class="ir-v">'+(m.pos||0)+'</span></div>'
      +(m.bio?'<div class="info-row"><span class="ir-k">Calidad bio</span><span class="ir-v" style="color:'+(m.bio==\'Buena\'?\'var(--g)\':m.bio==\'Mala\'?\'var(--r)\':\'var(--a)\')+'">'+x(m.bio)+'</span></div>':'<div class="info-row"><span class="ir-k">Calidad bio</span><span class="ir-v" style="color:var(--t3)">Sin analizar</span></div>')
      +'<div class="info-row"><span class="ir-k">Oportunidad</span><span class="ir-v">'+x(m.or||'&#8212;')+'</span></div>';
  } else {
    igBlock='<div style="padding:14px 0;text-align:center">'
      +'<div style="font-size:26px;margin-bottom:5px">&#128244;</div>'
      +'<div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:3px">Sin cuenta de Instagram</div>'
      +'<div style="font-size:12px;color:var(--t3)">Oportunidad de captaci&#243;n directa</div></div>';
  }

  var problem=m.ig
    ?'Tienen Instagram pero no genera pacientes. El perfil muestra '
      +(m.fol<100?'solo '+m.fol+' seguidores':m.fol<300?m.fol+' seguidores (muy por debajo del potencial)':m.pos<20?m.pos+' publicaciones totales (perfil inactivo)':'actividad por debajo de su capacidad')
      +(m.bio==='Mala'?' y la bio no tiene llamada a la acci&#243;n ni servicios visibles':'')+'. Est&#225;n pagando presencia sin obtener resultados.'
    :x(m.n)+' tiene '+m.rat+' estrellas y '+m.rev+' rese&#241;as en Google. Esa reputaci&#243;n solo existe para quien ya los busca. Sin Instagram, no aparecen donde los pacientes de 25&#8211;45 a&#241;os deciden antes de llamar. Su competencia en '+x(m.c)+' ya est&#225; ah&#237;.';

  var pitch=m.ig
    ?'"Hola, llamo de [agencia]. He revisado su perfil de Instagram &#8212; tienen '+m.fol+' seguidores y '+m.pos+' publicaciones. El perfil existe pero no est&#225; generando consultas nuevas. Cl&#237;nicas similares en '+x(m.c)+' con estrategia de contenido activa reciben 3&#8211;5 consultas nuevas al mes desde redes. &#191;Le gustar&#237;a ver un an&#225;lisis en 10 minutos de c&#243;mo lo conseguir&#237;amos?"'
    :'"Hola, llamo de [agencia]. He visto su cl&#237;nica en Google &#8212; tienen '+m.rev+' rese&#241;as con '+m.rat+' de valoraci&#243;n, es una reputaci&#243;n excelente. El problema es que en Instagram no aparecen, y ah&#237; es donde los pacientes de 25&#8211;45 a&#241;os buscan ahora. Sus competidores en '+x(m.c)+' ya est&#225;n captando ese tr&#225;fico. &#191;Le muestro lo que se est&#225; perdiendo?"';

  // WhatsApp message
  var waMsg='Hola,%20le%20escribo%20de%20[agencia].%20He%20analizado%20la%20presencia%20digital%20de%20'+encodeURIComponent(m.n)+'%20y%20tengo%20una%20propuesta%20concreta%20para%20captar%20m%C3%A1s%20pacientes%20desde%20Instagram.%20%C2%BFTiene%2010%20minutos%20esta%20semana%3F';
  var waNum=m.tel?m.tel.replace(/[\s\-\+]/g,''):'';

  var ctaHtml='';
  if(m.tel)ctaHtml+='<a class="cta cta-tel" href="tel:'+x(m.tel)+'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>Llamar</a>';
  if(waNum&&m.mobile)ctaHtml+='<a class="cta cta-wa" href="https://wa.me/34'+waNum+'?text='+waMsg+'" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>WhatsApp</a>';
  if(m.web&&m.web!=='#')ctaHtml+='<a class="cta cta-web" href="'+x(m.web)+'" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>Web</a>';
  if(m.ig&&m.igu)ctaHtml+='<a class="cta cta-ig" href="'+x(m.igu)+'" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>Instagram</a>';

  // CRM status buttons
  var statusBtns='<div class="crm-status">';
  var sts=['contactada','interesada','descartada','cerrada'];
  var stLabels={'contactada':'Contactada','interesada':'Interesada','descartada':'Descartar','cerrada':'&#127881; Cerrada'};
  for(var si=0;si<sts.length;si++){
    var s=sts[si];var active=crm.status===s?' active-status':'';
    statusBtns+='<button class="status-btn s-'+s+active+'" onclick="setStatus('+m.id+',\''+s+'\')">'+stLabels[s]+'</button>';
  }
  if(crm.status)statusBtns+='<button class="status-btn" onclick="setStatus('+m.id+',\'\')">Limpiar</button>';
  statusBtns+='</div>';

  return '<div class="det-hdr">'
    +'<div class="det-top"><div style="flex:1;min-width:0"><div class="det-name">'+x(m.n)+'</div><div class="det-city">'+x(m.c)+' &#183; '+x(m.p)+'</div>'
    +'<div class="det-badges">'+bPri(m.pri)+bIG(m)+bOpp(m.or)+(m.gap?bGap(m.gap):'')+(crm.status?statusBadge(crm.status):'')+'</div></div>'
    +'<div class="det-sc"><div class="det-sc-num" style="color:'+color+'">'+m.ls+'</div><div class="det-sc-lbl">lead score</div>'
    +'<div style="margin-top:7px;width:68px"><div class="sbar-track" style="height:5px"><div class="sbar-fill" style="width:'+m.ls+'%;background:'+color+'"></div></div></div></div></div>'
    +'<div class="det-cta">'+ctaHtml+'</div>'
    +'<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--b1);display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:justify;-ms-flex-pack:justify;justify-content:space-between;gap:8px">'
    +'<div style="font-size:11px;color:var(--t3)" id="refresh-ts-'+m.id+'">Datos cargados desde CSV. Busca manualmente para actualizar.</div>'
    +'<div style="display:-webkit-box;display:-ms-flexbox;display:flex;gap:6px">'
    +(m.igu?'<a class="btn" style="font-size:11px;padding:5px 10px" href="'+x(m.igu)+'" target="_blank" rel="noopener">Ver IG en vivo &#8599;</a>':'')
    +(m.web&&m.web!=='#'?'<a class="btn" style="font-size:11px;padding:5px 10px" href="'+x(m.web)+'" target="_blank" rel="noopener">Ver web &#8599;</a>':'')
    +'<a class="btn" style="font-size:11px;padding:5px 10px" href="https://www.google.com/search?q='+encodeURIComponent(m.n+' '+m.c)+'" target="_blank" rel="noopener">Google &#8599;</a>'
    +'</div></div>'
    +'</div>'

    +'<div class="det-blk"><div class="det-blk-t">Estado CRM &#183; Seguimiento</div>'
    +statusBtns
    +'<div style="margin-bottom:5px"><label style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px">Notas de contacto</label></div>'
    +'<textarea class="notes-area" id="notes-'+m.id+'" placeholder="Escribe aqu&#237; lo que hablaron, pr&#243;ximos pasos, objeciones..." onchange="saveNotes('+m.id+')">'+x(crm.notes||'')+'</textarea>'
    +'<div id="notes-saved-'+m.id+'" class="notes-saved">&#10003; Guardado</div>'
    +'</div>'

    +'<div class="det-2col">'
    +'<div>'
    +'<div class="det-blk"><div class="det-blk-t">Datos generales</div>'
    +'<div class="info-row"><span class="ir-k">Ciudad</span><span class="ir-v">'+x(m.c)+', '+x(m.p)+'</span></div>'
    +'<div class="info-row"><span class="ir-k">Tel&#233;fono</span><span class="ir-v" style="color:var(--g)">'+x(m.tel||'&#8212;')+'</span></div>'
    +'<div class="info-row"><span class="ir-k">Rating Google</span><span class="ir-v">'+m.rat+' &#9733; ('+m.rev+' rese&#241;as)</span></div>'
    +'<div class="info-row"><span class="ir-k">Score marketing</span><span class="ir-v">'+m.sc+'/10</span></div>'
    +'<div class="info-row"><span class="ir-k">Tipo de lead</span><span class="ir-v">'+x(m.tl||'&#8212;')+'</span></div>'
    +'</div>'
    +'<div class="det-blk"><div class="det-blk-t">Estado en Instagram</div>'+igBlock+'</div>'
    +'</div>'
    +'<div>'
    +'<div class="det-blk"><div class="det-blk-t">Diagn&#243;stico del problema</div>'
    +'<div class="prob-box"><div class="prob-lbl">&#9888; Problema detectado</div><div style="font-size:13px;color:var(--t1);line-height:1.65">'+problem+'</div></div>'
    +'</div>'
    +'<div class="det-blk"><div class="det-blk-t">Oportunidad comercial</div>'
    +'<div class="info-row"><span class="ir-k">Oportunidad redes</span><span class="ir-v">'+x(m.or||'&#8212;')+'</span></div>'
    +'<div class="info-row"><span class="ir-k">Oportunidad web</span><span class="ir-v">'+x(m.ow||'&#8212;')+'</span></div>'
    +'<div class="info-row"><span class="ir-k">GAP competitivo</span><span class="ir-v">'+x(m.gap||'&#8212;')+'</span></div>'
    +'<div class="info-row"><span class="ir-k">Prioridad</span><span class="ir-v">'+x(m.pri||'&#8212;')+'</span></div>'
    +'</div></div></div>'

    +'<div class="det-blk"><div class="det-blk-t">Servicio recomendado &#183; Argumento de venta</div>'
    +(m.srv?'<div style="margin-bottom:12px"><span class="badge b-p" style="font-size:12px;padding:5px 14px">'+x(m.srv)+'</span></div>':'')
    +'<div class="pitch-box"><div class="pitch-lbl">Argumento para la llamada</div><div class="pitch-txt">'+pitch+'</div></div></div>'
    +(m.mot?'<div class="det-blk"><div class="det-blk-t">Motivo de oportunidad</div><div style="font-size:13px;color:var(--t1);line-height:1.65">'+x(m.mot)+'</div></div>':'');
}

/* ─── CRM ACTIONS ─── */
function setStatus(id, status){
  var crm=getCRM(id);
  crm.status=status;
  if(status) crm.ts=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  saveCRM(id,crm);
  // Re-render buttons in place
  var m=D[id];
  document.getElementById('content').innerHTML=renderDetail(m);
  window.scrollTo(0,0);
}
function saveNotes(id){
  var el=document.getElementById('notes-'+id);
  if(!el)return;
  var crm=getCRM(id);
  crm.notes=el.value;
  saveCRM(id,crm);
  var saved=document.getElementById('notes-saved-'+id);
  if(saved){saved.style.display='block';setTimeout(function(){saved.style.display='none';},2000);}
}

init();
</script>

</html>
